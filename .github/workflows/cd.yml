  name: Next.js & React Frontend CD
  on:
    workflow_run:
      # ※ci.ymlの「name:」で指定している名前と完全に一致させる必要がある
      workflows: ["Next.js & React Frontend CI"] 
      types:
        - completed
      branches:
        - main

  jobs:
    deploy:
      # --- CIのワークフローの結果が成功の場合のみ実行する ---
      #if: ${{ github.event.workflow_run.conclusion == 'success' }}
      runs-on: ubuntu-latest

      # 【追加】このジョブを無条件でスキップ（一時停止）する
      if: false

      steps:
        # 運用環境へのSSH疎通確認
        - name: 運用環境へのSSH疎通確認
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.ACTIONS_AZURE_HOST }}
            username: ${{ secrets.ACTIONS_AZURE_USER }}
            key: ${{ secrets.ACTIONS_AZURE_SECRET }}
            script: |
              echo "GitHub Actions Runnerからの接続に成功しました。"
              echo "--- System Information ---"
              uname -a
              whoami
              
              echo "--- Runtime Information ---"
              # Node.js ランタイムの存在確認(未インストールの場合はエラーメッセージを出力)
              node -v || echo "Node.js is not installed yet."
      
        # 環境構築の自動化（Node.js & PM2）
        - name: 実行環境のプロビジョニング
        # SSH接続とリモートコマンド実行を抽象化するアクションを利用
          uses: appleboy/ssh-action@v1.0.3
          with:
            # GitHub Secretsから認証情報を安全に注入（ハードコーディングを防止）
            host: ${{ secrets.ACTIONS_AZURE_HOST }}
            username: ${{ secrets.ACTIONS_AZURE_USER }}
            key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          
            # サーバー側で実行する一連のシェルスクリプト
            script: |
              echo "--- Environment Provisioning Start ---"

              # Node.js(LTS v20)の導入と冪等性の確保
              # `command -v node` で既にコマンドが存在するかを判定。
              # 未導入の場合のみインストール処理を走らせることで、何度実行しても安全な構成(冪等性)にする
              if ! command -v node &> /dev/null; then
                echo "Node.js is not found. Installing Node.js LTS..."
              
              # NodeSourceの公式リポジトリを追加し、要件を満たすLTS版(v20)のセットアップを行う
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              
              # apt-get install に `-y` (yes) オプションを付与し、確認プロンプトによる自動化の停止を防ぐ
                sudo apt-get install -y nodejs
              else
                # 既にインストール済みの場合は、スキップして現在のバージョンを出力
                echo "Node.js is already installed: $(node -v)"
              fi

          
              # PM2(プロセスマネージャ)の導入
              # Next.jsアプリケーションの常駐化（デーモン化）と自動再起動を担うPM2を導入
              if ! command -v pm2 &> /dev/null; then
                echo "PM2 is not found. Installing PM2 globally..."
              
                # `-g` (global) オプションを指定し、システムのどこからでもpm2コマンドを叩けるようにする
                sudo npm install -g pm2
              else
                echo "PM2 is already installed: $(pm2 -v)"
              fi
              echo "--- Environment Provisioning Completed ---"
        
        # 成果物のビルドとファイル転送
        # リポジトリからソースコードを取得
        - name: コードのチェックアウト
          uses: actions/checkout@v4

        # ビルド用(CI Runner側)のNode.js環境を準備
        - name: Node.jsのセットアップ
          uses: actions/setup-node@v4
          with:
            node-version: '20'

        # 依存パッケージのインストール(クリーンインストール)
        - name: 依存ライブラリのインストール
          run: npm ci

        # Next.jsのビルド実行（Standaloneディレクトリの生成）
        - name: プロジェクトのビルド
          run: npm run build

        # 静的アセットの統合（転送の最適化）
        # Standalone出力には含まれないpublicと.next/static をコピーし、
        # 1つのフォルダ（.next/standalone）にすべての成果物を集約します。
        - name: デプロイ用成果物の準備
          run: |
            cp -r public .next/standalone/
            cp -r .next/static .next/standalone/.next/

        # SCPによるセキュアなファイル転送
        - name: 運用環境へ成果物を転送
          uses: appleboy/scp-action@v0.1.7
          with:
            host: ${{ secrets.ACTIONS_AZURE_HOST }}
            username: ${{ secrets.ACTIONS_AZURE_USER }}
            key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          
            # 転送元：先ほど準備した standalone ディレクトリの中身すべて
            source: ".next/standalone/*"
          
            # 転送先：サーバー側のデプロイ先パス（ご自身の環境に合わせて変更してください）
            target: "/home/${{ secrets.ACTIONS_AZURE_USER }}/ts-actions-app"
          
            # 転送先ディレクトリに余分な階層(.next/standalone/)を作らず、中身だけを直接配置する設定
            strip_components: 2

        # ==========================================
        # Webサーバーの連携とアプリケーションの起動
        # ==========================================
        - name: アプリケーションの起動とプロキシ連携
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.ACTIONS_AZURE_HOST }}
            username: ${{ secrets.ACTIONS_AZURE_USER }}
            key: ${{ secrets.ACTIONS_AZURE_SECRET }}
            script: |
              echo "--- Deployment & Integration Start ---"

              # デプロイ先ディレクトリへの移動
              # 前のステップ(SCP)で成果物を転送したディレクトリへ移動
              # このディレクトリを起点として、Next.jsのアプリケーションを起動
              cd /home/${{ secrets.ACTIONS_AZURE_USER }}/ts-actions-app

              # 既存プロセスを一度削除（存在しない場合のエラーは || true で無視）
              pm2 delete ts-actions-app || true
              # 3000番ポートを強制解放
              sudo fuser -k 3000/tcp -v -k || true
          
              # PM2によるプロセス起動と永続化（デーモン化）
              echo "NEXTAUTH_URL=http://${{ secrets.ACTIONS_AZURE_HOST }}" > .env
              echo "NEXTAUTH_SECRET=${{ secrets.AZURE_NEXTAUTH_SECRET }}" >> .env
              echo "API_BASE_URL=${{ secrets.AZURE_API_BASE_URL }}" >> .env
              # プロセスを起動
              pm2 start server.js --name "ts-actions-app" --env PORT=3000

              # 現在稼働しているプロセスの状態をPM2に保存
              # これにより、サーバー(OS)自体が再起動した際にも自動でNext.jsが起動
              pm2 save

              # 3. Nginxのインストール（冪等性の確保）
              # nginxコマンドが存在しない(未インストール)場合のみインストールを実行
              if ! command -v nginx &> /dev/null; then
                echo "Nginx is not found. Installing Nginx..."
                sudo apt-get update
                sudo apt-get install -y nginx
              fi

              # Nginx リバースプロキシ設定の動的生成
              # sudo tee コマンドを使用して、Nginxの設定ファイルをサーバー上に直接作成
              # インターネットからのアクセス(80番)を、先ほどPM2で起動したNext.js(3000番)へ中継(プロキシ)する設定
              sudo tee /etc/nginx/sites-available/ts-actions-app > /dev/null <<EOF
              server {
                listen 80;
                server_name _;

                location / {
                    # 内部の3000番ポートへ通信を転送
                    proxy_pass http://localhost:3000;
                    
                    # Next.jsの機能（WebSocketやストリーミング）を正常に動かすためのヘッダー設定
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                }
              }
              EOF

              # 設定の有効化とNginxの再起動
              # 作成した設定ファイルのシンボリックリンク(ショートカット)をenabled ディレクトリに作成して有効化する
              sudo ln -sf /etc/nginx/sites-available/ts-actions-app /etc/nginx/sites-enabled/ts-actions-app

              # Nginxインストール時に最初から存在するデフォルトの歓迎画面の設定を削除する
              sudo rm -f /etc/nginx/sites-enabled/default

              # Nginxを再起動し、新しい設定(3000番へのプロキシ)をシステムに反映さる
              sudo systemctl restart nginx
            
              echo "--- Deployment & Integration Completed ---"