name: Next.js & React Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: リポジトリのチェックアウト
      uses: actions/checkout@v4

    - name: Node.jsのセットアップとキャッシュの有効化
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # npmの依存パッケージを自動的にキャッシュする

    - name: 依存関係のインストール (npm ci)
      # package-lock.json に基づき、厳密かつ高速にパッケージをインストールする
      run: npm ci
    
    # --- ここから下の10行を追加 ---
    - name: 静的解析 (ESLint)
      run: npm run lint

    - name: コードフォーマット検証 (Prettier) 
      # --check オプションで、フォーマット違反がある場合、CIを停止させる
      run: npx prettier --check "src/**/*.{js,jsx,ts,tsx}"

    - name: 型チェック (TypeScript)
      # --noEmit でコンパイル結果を出力せず、型エラーの有無だけを高速検証する
      run: npx tsc --noEmit
    
    - name: コンポーネントテストの実行(Vitest & RTL)
      run: npm run test
    
    # --- ここから下の行を追加 ---
    - name: Playwrightブラウザのインストール
      run: npx playwright install --with-deps

    - name: アプリケーションのリリース版ビルド
      run: npm run build

    - name: Playwrightテストの実行 (E2E)
      run: npx playwright test

    - name: Playwrightレポートのアップロード
      uses: actions/upload-artifact@v4
      if: always() # テストが失敗しても必ずレポートを保存する
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
  