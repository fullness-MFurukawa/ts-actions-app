name: Next.js & React Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: リポジトリのチェックアウト
      uses: actions/checkout@v4

    - name: Node.jsのセットアップとキャッシュの有効化
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # npmの依存パッケージを自動的にキャッシュする

    - name: 依存関係のインストール (npm ci)
      # package-lock.json に基づき、厳密かつ高速にパッケージをインストールする
      run: npm ci
    
    # --- ここから下の8行を追加 ---
    - name: 静的解析 (ESLint)
      run: npm run lint

    - name: 型チェック (TypeScript)
      # --noEmitオプションでJSファイルを出力せず、型エラーの有無だけを高速に検証する
      run: npx tsc --noEmit